<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — CardioArab</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b1220;--bg2:#111827;--bg3:#1a2235;--border:#1e2d45;--text:#e2e8f0;--text2:#94a3b8;--accent:#8b5cf6;--green:#10b981;--red:#ef4444;--font:'IBM Plex Sans Arabic',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem}
.card{width:100%;max-width:420px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:2.25rem 2rem}
.logo{text-align:center;margin-bottom:2rem}
.logo h1{font-size:1.6rem;font-weight:700;color:#fff}
.logo h1 span{color:var(--accent)}
.logo p{color:var(--text2);font-size:.88rem;margin-top:.35rem}
.form-group{margin-bottom:1.1rem}
.form-group label{display:block;font-size:.83rem;color:var(--text2);margin-bottom:.4rem;font-weight:600}
.form-group input{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:.95rem;transition:.2s}
.form-group input:focus{outline:none;border-color:var(--accent)}
.btn{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff;font-family:var(--font);font-size:1rem;font-weight:700;cursor:pointer;transition:.2s;margin-top:.5rem}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(139,92,246,.4)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.alert{padding:10px 14px;border-radius:8px;margin-bottom:1rem;font-size:.875rem;display:none}
.alert.show{display:block}
.alert-success{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.alert-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.links{text-align:center;margin-top:1.25rem}
.links a{color:var(--accent);text-decoration:none;font-weight:600;font-size:.88rem}
.links p{margin:.4rem 0;color:var(--text2);font-size:.85rem}
</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#8b5cf6">
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🫀 <span>CardioArab</span></h1>
    <p>منصة قلبية عربية متخصصة</p>
  </div>
  <div class="alert" id="msg"></div>
  <div class="form-group">
    <label>📧 البريد الإلكتروني</label>
    <input type="email" id="loginEmail" placeholder="example@email.com" dir="ltr">
  </div>
  <div class="form-group">
    <label>🔑 كلمة المرور</label>
    <input type="password" id="loginPassword" placeholder="••••••••" dir="ltr">
  </div>
  <button class="btn" id="loginBtn" onclick="handleLogin()">تسجيل الدخول</button>
  <div class="links">
    <p>ليس لديك حساب؟ <a href="register.html">إنشاء حساب</a></p>
    <p><a href="index.html">🏠 العودة للرئيسية</a></p>
  </div>
</div>

<script src="supabase.js"></script>
<script>
function showMsg(txt, type) {
  const el = document.getElementById('msg');
  el.textContent = txt;
  el.className = 'alert show alert-' + type;
}

const DEVICE_COOLDOWN_DAYS = 15;
let pendingUser = null; // مستخدم بانتظار تأكيد "هذا جهازي الجديد"

async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const pass  = document.getElementById('loginPassword').value.trim();
  const btn   = document.getElementById('loginBtn');

  if (!email || !pass) return showMsg('⚠️ يرجى تعبئة جميع الحقول', 'danger');

  btn.disabled = true;
  btn.textContent = '⏳ جاري الدخول...';

  try {
    const users = await db.select('users', `?email=eq.${email}&password=eq.${pass}`);
    if (!users.length) {
      showMsg('❌ البريد الإلكتروني أو كلمة المرور غير صحيحة', 'danger');
      btn.disabled = false; btn.textContent = 'تسجيل الدخول';
      return;
    }

    const user = users[0];

    if (user.blocked) {
      showMsg('🚫 هذا الحساب محظور. يرجى التواصل مع المالك', 'danger');
      btn.disabled = false; btn.textContent = 'تسجيل الدخول';
      return;
    }

    // فحص الجهاز — الحساب مقيّد بجهاز واحد فقط (لا يشمل حساب المالك)
    if (!user.is_admin) {
      const myDevice = device.getId();

      if (!user.device_id) {
        // أول تسجيل دخول على الإطلاق — اربط الحساب بهذا الجهاز
        await db.update('users', `?id=eq.${user.id}`, {
          device_id: myDevice,
          device_changed_at: new Date().toISOString()
        });
      } else if (user.device_id !== myDevice) {
        // جهاز مختلف عن الجهاز المسجّل
        const changedAt = user.device_changed_at ? new Date(user.device_changed_at) : null;
        const daysSince = changedAt ? (Date.now() - changedAt.getTime()) / 86400000 : Infinity;

        if (daysSince < DEVICE_COOLDOWN_DAYS) {
          const remaining = Math.ceil(DEVICE_COOLDOWN_DAYS - daysSince);
          showMsg(`🚫 هذا الحساب مستخدم على جهاز آخر. يمكن تغيير الجهاز بعد ${remaining} يوم، أو تواصل مع المالك`, 'danger');
          btn.disabled = false; btn.textContent = 'تسجيل الدخول';
          return;
        }

        // مضت 15 يوم أو أكثر — اسمح بالتبديل بعد تأكيد صريح من المستخدم
        pendingUser = user;
        showDeviceConfirm();
        btn.disabled = false; btn.textContent = 'تسجيل الدخول';
        return;
      }
      // نفس الجهاز — تابع الدخول عادي
    }

    await finishLogin(user, email);

  } catch (e) {
    console.error(e);
    showMsg('❌ خطأ في الاتصال، حاول مرة أخرى', 'danger');
    btn.disabled = false; btn.textContent = 'تسجيل الدخول';
  }
}

function showDeviceConfirm() {
  const el = document.getElementById('msg');
  el.innerHTML = '⚠️ هذا الحساب مرتبط بجهاز آخر — لكن مضى أكثر من ' + DEVICE_COOLDOWN_DAYS + ' يوماً، فيمكنك ربط هذا الجهاز الآن.' +
    '<br><button class="btn" style="margin-top:.75rem" onclick="confirmNewDevice()">✅ هذا جهازي الجديد</button>';
  el.className = 'alert show alert-danger';
}

async function confirmNewDevice() {
  if (!pendingUser) return;
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;

  try {
    const myDevice = device.getId();
    await db.update('users', `?id=eq.${pendingUser.id}`, {
      device_id: myDevice,
      device_changed_at: new Date().toISOString()
    });
    const email = pendingUser.email;
    await finishLogin(pendingUser, email);
  } catch (e) {
    console.error(e);
    showMsg('❌ خطأ في الاتصال، حاول مرة أخرى', 'danger');
  }
  btn.disabled = false; btn.textContent = 'تسجيل الدخول';
}

async function finishLogin(user, email) {
  // فحص انتهاء الاشتراك
  if (!user.is_admin) {
    const subs = await db.select('subscriptions', `?user_id=eq.${user.id}&active=eq.true`);
    if (subs.length && subs[0].end_date && new Date() > new Date(subs[0].end_date)) {
      await db.update('subscriptions', `?id=eq.${subs[0].id}`, { active: false });
      showMsg('⏳ انتهت صلاحية اشتراكك. يرجى التواصل مع المالك لتجديده', 'danger');
      const btn = document.getElementById('loginBtn');
      btn.disabled = false; btn.textContent = 'تسجيل الدخول';
      return;
    }
  }

  session.set(user);
  try { await db.update('users', `?id=eq.${user.id}`, { last_login: new Date().toISOString() }); } catch(e) {}
  await addLog('تسجيل دخول ناجح', email);
  showMsg('✅ تم تسجيل الدخول بنجاح!', 'success');

  setTimeout(() => {
    window.location.href = user.is_admin ? 'admin.html' : 'index.html';
  }, 1200);
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
<script src="protection.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(console.warn);
  });
}
</script>
<script src="pwa-install.js"></script>
</body>
</html>
