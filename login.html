<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — CardioArab</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b1220;--bg2:#111827;--bg3:#1a2235;--border:#1e2d45;--text:#e2e8f0;--text2:#94a3b8;--accent:#8b5cf6;--green:#10b981;--red:#ef4444;--font:'IBM Plex Sans Arabic',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem}
.card{width:100%;max-width:420px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:2.25rem 2rem}
.logo{text-align:center;margin-bottom:2rem}
.logo h1{font-size:1.6rem;font-weight:700;color:#fff}
.logo h1 span{color:var(--accent)}
.logo p{color:var(--text2);font-size:.88rem;margin-top:.35rem}
.form-group{margin-bottom:1.1rem}
.form-group label{display:block;font-size:.83rem;color:var(--text2);margin-bottom:.4rem;font-weight:600}
.form-group input{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:.95rem;transition:.2s}
.form-group input:focus{outline:none;border-color:var(--accent)}
.btn{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff;font-family:var(--font);font-size:1rem;font-weight:700;cursor:pointer;transition:.2s;margin-top:.5rem}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(139,92,246,.4)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.alert{padding:10px 14px;border-radius:8px;margin-bottom:1rem;font-size:.875rem;display:none}
.alert.show{display:block}
.alert-success{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.alert-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.links{text-align:center;margin-top:1.25rem}
.links a{color:var(--accent);text-decoration:none;font-weight:600;font-size:.88rem}
.links p{margin:.4rem 0;color:var(--text2);font-size:.85rem}
.divider-or{display:flex;align-items:center;gap:.75rem;margin:1.25rem 0;color:var(--text2);font-size:.8rem}
.divider-or::before,.divider-or::after{content:'';flex:1;height:1px;background:var(--border)}
.btn-outline{width:100%;padding:11px;border:1px solid var(--border);border-radius:10px;background:var(--bg3);color:var(--text);font-family:var(--font);font-size:.92rem;font-weight:600;cursor:pointer;transition:.2s;margin-top:.6rem;display:flex;align-items:center;justify-content:center;gap:.5rem}
.btn-outline:hover{border-color:var(--accent);background:#212c47}
.btn-outline:disabled{opacity:.6;cursor:not-allowed}
#phoneForm{display:none;margin-top:.9rem;padding-top:.9rem;border-top:1px dashed var(--border)}
</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#8b5cf6">
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🫀 <span>CardioArab</span></h1>
    <p>منصة قلبية عربية متخصصة</p>
  </div>
  <div class="alert" id="msg"></div>
  <div class="form-group">
    <label>📧 البريد الإلكتروني</label>
    <input type="email" id="loginEmail" placeholder="example@email.com" dir="ltr">
  </div>
  <div class="form-group">
    <label>🔑 كلمة المرور</label>
    <input type="password" id="loginPassword" placeholder="••••••••" dir="ltr">
  </div>
  <button class="btn" id="loginBtn" onclick="handleLogin()">تسجيل الدخول</button>

  <div class="divider-or"><span>أو</span></div>

  <button class="btn-outline" id="googleBtn" onclick="handleGoogleLogin()">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.3 0 10.2-2 13.9-5.4l-6.4-5.4C29.4 34.9 26.8 36 24 36c-5.2 0-9.6-3.1-11.3-7.6l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.3-4.1 5.7l6.4 5.4C40.9 36.3 44 30.6 44 24c0-1.3-.1-2.7-.4-3.5z"/></svg>
    الدخول بحساب Google
  </button>
  <button class="btn-outline" id="phoneToggleBtn" onclick="togglePhoneForm()">📱 الدخول برقم الهاتف</button>

  <div id="phoneForm">
    <div class="form-group">
      <label>رقم الهاتف (مع رمز الدولة)</label>
      <input type="tel" id="phoneInput" placeholder="+9665XXXXXXXX" dir="ltr">
    </div>
    <button class="btn-outline" id="sendOtpBtn" onclick="handleSendOtp()" style="margin-top:0">إرسال رمز التحقق</button>

    <div class="form-group" id="otpGroup" style="display:none;margin-top:1rem">
      <label>رمز التحقق (SMS)</label>
      <input type="text" id="otpInput" placeholder="000000" dir="ltr" maxlength="6" inputmode="numeric">
      <button class="btn-outline" id="verifyOtpBtn" onclick="handleVerifyOtp()" style="margin-top:.6rem">تأكيد الرمز</button>
    </div>
  </div>

  <div class="links">
    <p>ليس لديك حساب؟ <a href="register.html">إنشاء حساب</a></p>
    <p><a href="index.html">🏠 العودة للرئيسية</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
function showMsg(txt, type) {
  const el = document.getElementById('msg');
  el.textContent = txt;
  el.className = 'alert show alert-' + type;
}

const DEVICE_COOLDOWN_DAYS = 15;
let pendingUser = null; // مستخدم بانتظار تأكيد "هذا جهازي الجديد"
let pendingEmail = null;

async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const pass  = document.getElementById('loginPassword').value.trim();
  const btn   = document.getElementById('loginBtn');

  if (!email || !pass) return showMsg('⚠️ يرجى تعبئة جميع الحقول', 'danger');

  btn.disabled = true;
  btn.textContent = '⏳ جاري الدخول...';

  try {
    const users = await db.select('users', `?email=eq.${email}&password=eq.${pass}`);
    if (!users.length) {
      showMsg('❌ البريد الإلكتروني أو كلمة المرور غير صحيحة', 'danger');
      btn.disabled = false; btn.textContent = 'تسجيل الدخول';
      return;
    }

    await checkDeviceAndProceed(users[0], email);
    btn.disabled = false; btn.textContent = 'تسجيل الدخول';

  } catch (e) {
    console.error(e);
    showMsg('❌ خطأ في الاتصال، حاول مرة أخرى', 'danger');
    btn.disabled = false; btn.textContent = 'تسجيل الدخول';
  }
}

// فحص قفل الجهاز (لا يشمل حساب المالك) ثم إكمال تسجيل الدخول.
// دالة مشتركة تستخدمها كل طرق الدخول: كلمة المرور، جوجل، الهاتف.
async function checkDeviceAndProceed(user, email) {
  if (user.blocked) {
    showMsg('🚫 هذا الحساب محظور. يرجى التواصل مع المالك', 'danger');
    return;
  }

  if (!user.is_admin) {
    const myDevice = device.getId();

    if (!user.device_id) {
      // أول تسجيل دخول على الإطلاق — اربط الحساب بهذا الجهاز
      await db.update('users', `?id=eq.${user.id}`, {
        device_id: myDevice,
        device_changed_at: new Date().toISOString()
      });
    } else if (user.device_id !== myDevice) {
      // جهاز مختلف عن الجهاز المسجّل
      const changedAt = user.device_changed_at ? new Date(user.device_changed_at) : null;
      const daysSince = changedAt ? (Date.now() - changedAt.getTime()) / 86400000 : Infinity;

      if (daysSince < DEVICE_COOLDOWN_DAYS) {
        const remaining = Math.ceil(DEVICE_COOLDOWN_DAYS - daysSince);
        showMsg(`🚫 هذا الحساب مستخدم على جهاز آخر. يمكن تغيير الجهاز بعد ${remaining} يوم، أو تواصل مع المالك`, 'danger');
        return;
      }

      // مضت 15 يوم أو أكثر — اسمح بالتبديل بعد تأكيد صريح من المستخدم
      pendingUser = user;
      pendingEmail = email;
      showDeviceConfirm();
      return;
    }
    // نفس الجهاز — تابع الدخول عادي
  }

  await finishLogin(user, email);
}

function showDeviceConfirm() {
  const el = document.getElementById('msg');
  el.innerHTML = '⚠️ هذا الحساب مرتبط بجهاز آخر — لكن مضى أكثر من ' + DEVICE_COOLDOWN_DAYS + ' يوماً، فيمكنك ربط هذا الجهاز الآن.' +
    '<br><button class="btn" style="margin-top:.75rem" onclick="confirmNewDevice()">✅ هذا جهازي الجديد</button>';
  el.className = 'alert show alert-danger';
}

async function confirmNewDevice() {
  if (!pendingUser) return;
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;

  try {
    const myDevice = device.getId();
    await db.update('users', `?id=eq.${pendingUser.id}`, {
      device_id: myDevice,
      device_changed_at: new Date().toISOString()
    });
    await finishLogin(pendingUser, pendingEmail || pendingUser.email);
  } catch (e) {
    console.error(e);
    showMsg('❌ خطأ في الاتصال، حاول مرة أخرى', 'danger');
  }
  btn.disabled = false; btn.textContent = 'تسجيل الدخول';
}

async function finishLogin(user, email) {
  // فحص انتهاء الاشتراك
  if (!user.is_admin) {
    const subs = await db.select('subscriptions', `?user_id=eq.${user.id}&active=eq.true`);
    if (subs.length && subs[0].end_date && new Date() > new Date(subs[0].end_date)) {
      await db.update('subscriptions', `?id=eq.${subs[0].id}`, { active: false });
      showMsg('⏳ انتهت صلاحية اشتراكك. يرجى التواصل مع المالك لتجديده', 'danger');
      const btn = document.getElementById('loginBtn');
      btn.disabled = false; btn.textContent = 'تسجيل الدخول';
      return;
    }
  }

  session.set(user);
  await addLog('تسجيل دخول ناجح', email);
  showMsg('✅ تم تسجيل الدخول بنجاح!', 'success');

  setTimeout(() => {
    window.location.href = user.is_admin ? 'admin.html' : 'index.html';
  }, 1200);
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

// ─── تسجيل الدخول بجوجل ──────────────────────────────────────────────────
async function handleGoogleLogin() {
  const btn = document.getElementById('googleBtn');
  btn.disabled = true;
  try {
    await auth.signInWithGoogle(window.location.href);
    // من هنا يحوّل المتصفح لصفحة جوجل تلقائياً، ثم يرجع لهذه الصفحة
  } catch (e) {
    console.error(e);
    showMsg('❌ تعذّر بدء الدخول بجوجل. تأكد أن ميزة Google مفعّلة في إعدادات Supabase', 'danger');
    btn.disabled = false;
  }
}

// عند رجوع المستخدم من تحويلة جوجل، تكون هناك جلسة Supabase Auth جاهزة —
// نربطها تلقائياً بجدول users المخصص ونكمل تسجيل الدخول العادي.
(async function checkGoogleRedirectReturn() {
  try {
    const authUser = await auth.getAuthUser();
    if (!authUser) return;
    showMsg('⏳ جاري إكمال تسجيل الدخول...', 'success');
    const appUser = await findOrCreateAppUser(authUser);
    await checkDeviceAndProceed(appUser, appUser.email || appUser.phone);
  } catch (e) {
    console.error(e);
    showMsg('❌ حدث خطأ أثناء ربط حساب جوجل بحسابك', 'danger');
  }
})();

// ─── تسجيل الدخول برقم الهاتف (OTP عبر SMS) ─────────────────────────────
function togglePhoneForm() {
  const el = document.getElementById('phoneForm');
  el.style.display = (el.style.display === 'block') ? 'none' : 'block';
}

async function handleSendOtp() {
  const phone = document.getElementById('phoneInput').value.trim();
  const btn = document.getElementById('sendOtpBtn');
  if (!phone.startsWith('+')) {
    return showMsg('⚠️ أدخل رقم الهاتف بصيغة دولية تبدأ بـ + (مثال: +9665XXXXXXXX)', 'danger');
  }
  btn.disabled = true;
  btn.textContent = '⏳ جاري الإرسال...';
  try {
    await auth.sendPhoneOtp(phone);
    document.getElementById('otpGroup').style.display = 'block';
    showMsg('✅ تم إرسال رمز التحقق عبر SMS', 'success');
  } catch (e) {
    console.error(e);
    showMsg('❌ تعذّر إرسال رمز التحقق. تأكد أن ميزة الهاتف مفعّلة في إعدادات Supabase', 'danger');
  }
  btn.disabled = false; btn.textContent = 'إرسال رمز التحقق';
}

async function handleVerifyOtp() {
  const phone = document.getElementById('phoneInput').value.trim();
  const token = document.getElementById('otpInput').value.trim();
  const btn = document.getElementById('verifyOtpBtn');
  if (!token) return showMsg('⚠️ أدخل رمز التحقق المُرسل إليك', 'danger');

  btn.disabled = true;
  btn.textContent = '⏳ جاري التحقق...';
  try {
    const authUser = await auth.verifyPhoneOtp(phone, token);
    const appUser = await findOrCreateAppUser(authUser);
    await checkDeviceAndProceed(appUser, appUser.email || appUser.phone);
  } catch (e) {
    console.error(e);
    showMsg('❌ رمز التحقق غير صحيح أو منتهي الصلاحية', 'danger');
  }
  btn.disabled = false; btn.textContent = 'تأكيد الرمز';
}
</script>
<script src="protection.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(console.warn);
  });
}
</script>
<script src="pwa-install.js"></script>
</body>
</html>
