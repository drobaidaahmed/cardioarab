<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محاضرات طبية | CardioArab</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b1220;--bg2:#111827;--bg3:#1a2235;--border:#1e2d45;--text:#e2e8f0;--text2:#94a3b8;--accent:#8b5cf6;--font:'IBM Plex Sans Arabic',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

.top-bar{display:flex;justify-content:flex-end;gap:.6rem;flex-wrap:wrap;padding:12px 20px;max-width:1100px;margin:0 auto;width:100%}
.top-bar a{color:var(--text2);text-decoration:none;font-size:.85rem;padding:.4rem 1rem;border:1px solid var(--border);border-radius:8px;transition:.2s;background:var(--bg2)}
.top-bar a:hover{border-color:var(--accent);color:var(--accent)}
.top-bar a.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.top-bar a.btn-primary:hover{background:#7c3aed;border-color:#7c3aed}

header{text-align:center;padding:50px 20px 35px;background:var(--bg2);border-bottom:1px solid var(--border)}
header h1{font-size:32px;font-weight:700}
header h1 span{color:var(--accent)}
header p{opacity:.7;margin-top:10px;font-size:16px}
header .tr{display:block;font-size:13px;opacity:.45;margin-top:4px}
header .back{display:inline-block;margin-top:16px;color:var(--accent);text-decoration:none;font-size:.85rem}

.container{max-width:900px;margin:0 auto;padding:40px 20px;flex:1;width:100%}

.list{display:flex;flex-direction:column;gap:16px}
.article-card{display:flex;gap:16px;align-items:flex-start;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:22px 24px;text-decoration:none;color:var(--text);transition:.25s}
.article-card:hover{border-color:rgba(139,92,246,.4);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.3);background:var(--bg3)}
.article-card .icon{font-size:28px;flex:0 0 auto}
.article-card .body{flex:1}
.article-card h2{font-size:17px;font-weight:700;margin-bottom:6px}
.article-card .meta{font-size:12.5px;color:var(--text2);margin-bottom:8px}
.article-card .desc{font-size:13.5px;color:var(--text2);line-height:1.7}
.article-card .badge{display:inline-block;margin-top:10px;background:var(--accent);color:#fff;font-size:11.5px;padding:3px 10px;border-radius:20px}

/* PAYWALL */
.paywall{max-width:520px;margin:60px auto;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px 30px;text-align:center}
.paywall .lock{font-size:40px;margin-bottom:14px}
.paywall h2{font-size:19px;margin-bottom:10px}
.paywall p{color:var(--text2);font-size:14px;line-height:1.8;margin-bottom:22px}
.paywall a.btn-primary{display:inline-block;background:var(--accent);color:#fff;text-decoration:none;padding:.7rem 1.6rem;border-radius:10px;font-size:.9rem;font-weight:700;margin:0 6px}
.paywall a.btn-secondary{display:inline-block;background:var(--bg3);color:var(--text2);text-decoration:none;padding:.7rem 1.6rem;border-radius:10px;font-size:.9rem;border:1px solid var(--border);margin:0 6px}

footer{text-align:center;padding:28px 20px;opacity:.65;font-size:13px;border-top:1px solid var(--border);margin-top:10px}
footer strong{color:var(--accent)}

@media(max-width:600px){
  header h1{font-size:24px}
  header{padding:35px 20px 25px}
  .container{padding:20px 16px}
  .top-bar{justify-content:center}
  .article-card{flex-direction:column}
}
</style>
</head>
<body>

<div class="top-bar" id="topBar">
  <a href="articles.html">← مقالات ومحاضرات</a>
  <a href="subscription.html" class="btn-primary">📋 خطط الاشتراك</a>
  <a href="login.html">🔐 لوحة التحكم</a>
</div>

<header>
  <h1>🎓 <span>محاضرات</span> طبية</h1>
  <p>Medical Lectures</p>
  <span class="tr">محاضرات ودورات تعليمية في طب القلب</span>
  <a href="articles.html" class="back">→ العودة إلى مقالات ومحاضرات</a>
</header>

<div class="container" id="mainContainer">
  <div class="list" id="articlesList" style="text-align:center;color:var(--text2);padding:40px 20px;font-size:14px;">
    🎬 سيتم إضافة المحاضرات قريباً
  </div>
</div>

<footer>
  <strong>د. عبيدة سمير أحمد</strong> © 2026 — جميع الحقوق محفوظة
  <span class="tr" style="display:block;font-size:12px;opacity:.5;margin-top:4px">منصة كارديو عرب 2026 — موجهة لأطباء القلب</span>
</footer>

<script src="supabase.js"></script>
<script>
(async function(){
  try{
    const u = JSON.parse(localStorage.getItem('currentUser'));
    const isAdmin = u && u.is_admin;
    const isSubscribed = !isAdmin && u ? await session.isSubscribed() : false;
    if(!isAdmin && !isSubscribed){
      location.href = 'subscription.html';
      return;
    }

    const topBar = document.getElementById('topBar');
    const BACK_BTN = `<a href="articles.html">← مقالات ومحاضرات</a>`;

    if(isAdmin){
      topBar.innerHTML = BACK_BTN + `<a href="subscription.html" class="btn-primary">📋 خطط الاشتراك</a><a href="admin.html" style="color:#f59e0b;border-color:#f59e0b;">🎛️ لوحة التحكم</a>`;
    }else{
      topBar.innerHTML = BACK_BTN + `<a href="subscription.html" class="btn-primary">📋 اشتراكي</a><a href="profile.html" style="text-decoration:none;font-size:.85rem;padding:.4rem 1rem;border:1px solid #1e2d45;border-radius:8px;background:#111827;color:#94a3b8;">👤 ${u.name}</a>`;
    }
  }catch(e){
    location.href = 'subscription.html';
  }
})();
</script>
<script src="protection.js"></script>
<script src="notes.js"></script>
</body>
</html>
