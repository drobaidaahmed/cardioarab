<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - CardioArab</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b1220;
            --bg2: #111827;
            --bg3: #1a2235;
            --border: #1e2d45;
            --text: #e2e8f0;
            --text2: #94a3b8;
            --accent: #8b5cf6;
            --green: #10b981;
            --red: #ef4444;
            --gold: #f59e0b;
            --blue: #3b82f6;
            --font: 'IBM Plex Sans Arabic', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
        }

        /* ─── Header ─── */
        .header {
            background: linear-gradient(135deg, #1a0a3a, #0b1220);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header .logo { font-size: 1.2rem; font-weight: 700; }
        .header .logo span { color: var(--accent); }
        .header .badge {
            background: linear-gradient(135deg, var(--gold), #d97706);
            color: #1a0a00;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .header nav { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
        .header nav a {
            color: var(--text2);
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.875rem;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .header nav a:hover { color: var(--text); border-color: var(--border); background: var(--bg3); }
        .btn-logout {
            background: rgba(239,68,68,0.15) !important;
            color: var(--red) !important;
            border-color: rgba(239,68,68,0.3) !important;
            cursor: pointer;
        }
        .btn-logout:hover { background: rgba(239,68,68,0.25) !important; }

        /* ─── Layout ─── */
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }

        /* ─── Stats Row ─── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            text-align: center;
        }
        .stat-card .num { font-size: 2rem; font-weight: 700; margin-bottom: 4px; }
        .stat-card .lbl { font-size: 0.8rem; color: var(--text2); }
        .stat-card.purple .num { color: var(--accent); }
        .stat-card.green .num { color: var(--green); }
        .stat-card.gold .num { color: var(--gold); }
        .stat-card.red .num { color: var(--red); }

        /* ─── Section ─── */
        .section {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.75rem;
            margin-bottom: 1.5rem;
        }
        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        /* ─── Form ─── */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media(max-width:600px){ .form-row { grid-template-columns: 1fr; } }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text2); margin-bottom: 6px; font-weight: 600; }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: var(--font);
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus { outline: none; border-color: var(--accent); }
        .form-group input[dir="ltr"] { text-align: left; direction: ltr; }

        /* ─── Buttons ─── */
        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 10px;
            font-family: var(--font);
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: linear-gradient(135deg, var(--accent), #7c3aed); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(139,92,246,0.4); }
        .btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
        .btn-danger:hover { background: rgba(239,68,68,0.25); }
        .btn-success { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
        .btn-success:hover { background: rgba(16,185,129,0.25); }
        .btn-sm { padding: 6px 14px; font-size: 0.8rem; border-radius: 8px; }

        /* ─── Alert ─── */
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            margin-top: 1rem;
            font-size: 0.9rem;
            font-weight: 600;
            display: none;
        }
        .alert.show { display: block; }
        .alert-success { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
        .alert-danger { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }

        /* ─── Users Table ─── */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        thead th {
            background: var(--bg2);
            color: var(--text2);
            padding: 10px 14px;
            text-align: right;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }
        tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
        tbody tr:hover { background: rgba(255,255,255,0.03); }
        tbody td { padding: 10px 14px; vertical-align: middle; }
        .badge-plan {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .badge-yearly { background: rgba(245,158,11,0.2); color: var(--gold); }
        .badge-monthly { background: rgba(59,130,246,0.2); color: var(--blue); }
        .badge-free { background: rgba(148,163,184,0.2); color: var(--text2); }
        .badge-blocked { background: rgba(239,68,68,0.2); color: var(--red); }
        .badge-active { background: rgba(16,185,129,0.2); color: var(--green); }
        .badge-admin { background: rgba(245,158,11,0.2); color: var(--gold); }

        /* ─── Search ─── */
        .search-bar {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: var(--font);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .search-bar:focus { outline: none; border-color: var(--accent); }

        /* ─── Log ─── */
        .log-list { list-style: none; }
        .log-list li {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }
        .log-list li:last-child { border-bottom: none; }
        .log-list li .msg { color: var(--text); }
        .log-list li .time { white-space: nowrap; font-size: 0.75rem; }

        /* ─── Empty ─── */
        .empty { text-align: center; padding: 2rem; color: var(--text2); font-size: 0.9rem; }

        /* ─── Password strength ─── */
        .strength-bar { height: 4px; border-radius: 2px; margin-top: 6px; background: var(--border); overflow: hidden; }
        .strength-fill { height: 100%; border-radius: 2px; width: 0; transition: all 0.3s; }
    </style>
</head>
<body>

<header class="header">
    <div style="display:flex; align-items:center; gap:0.75rem;">
        <div class="logo">💓 <span>CardioArab</span></div>
        <span class="badge">👑 لوحة التحكم</span>
    </div>
    <nav>
        <a href="index.html">🏠 الرئيسية</a>
        <a href="guidelines.html">📚 المرشدات</a>
        <a href="profile.html">👤 ملفي</a>
        <a href="#" class="btn-logout" onclick="doLogout()">🚪 تسجيل خروج</a>
    </nav>
</header>

<div class="container">

    <!-- Stats -->
    <div class="stats-row" id="statsRow">
        <div class="stat-card purple"><div class="num" id="statTotal">—</div><div class="lbl">إجمالي المستخدمين</div></div>
        <div class="stat-card green"><div class="num" id="statActive">—</div><div class="lbl">اشتراك نشط</div></div>
        <div class="stat-card gold"><div class="num" id="statYearly">—</div><div class="lbl">اشتراك سنوي</div></div>
        <div class="stat-card red"><div class="num" id="statBlocked">—</div><div class="lbl">محظورون</div></div>
    </div>

    <!-- ══════════════════════════════════
         تغيير كلمة السر
    ══════════════════════════════════ -->
    <div class="section">
        <div class="section-title">🔑 تغيير كلمة مرور المالك</div>
        <div class="form-row">
            <div class="form-group">
                <label>🛡️ الكود السري للتحقق</label>
                <input type="password" id="verifyCode" placeholder="أدخل كود التحقق" dir="ltr">
            </div>
            <div class="form-group">
                <label>🔑 كلمة المرور الحالية</label>
                <input type="password" id="currentPass" placeholder="كلمة مرورك الحالية" dir="ltr">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>🆕 كلمة المرور الجديدة</label>
                <input type="password" id="newPass" placeholder="6 أحرف على الأقل" dir="ltr" oninput="checkStrength(this.value)">
                <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            </div>
            <div class="form-group">
                <label>✅ تأكيد كلمة المرور الجديدة</label>
                <input type="password" id="confirmPass" placeholder="أعد كتابة كلمة المرور" dir="ltr">
            </div>
        </div>
        <button class="btn btn-primary" onclick="changePassword()">🔐 تغيير كلمة المرور</button>
        <div class="alert" id="passAlert"></div>
    </div>

    <!-- ══════════════════════════════════
         المستخدمون
    ══════════════════════════════════ -->
    <div class="section">
        <div class="section-title">👥 إدارة المستخدمين</div>
        <input class="search-bar" type="text" placeholder="🔍 بحث بالاسم أو البريد..." oninput="filterUsers(this.value)">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الاسم</th>
                        <th>البريد الإلكتروني</th>
                        <th>الخطة</th>
                        <th>الحالة</th>
                        <th>تاريخ التسجيل</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr><td colspan="7" class="empty">جارٍ التحميل...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- ══════════════════════════════════
         سجل الأمان
    ══════════════════════════════════ -->
    <div class="section">
        <div class="section-title" style="justify-content:space-between;">
            <span>📋 سجل الأمان</span>
            <button class="btn btn-danger btn-sm" onclick="clearLog()">🗑️ مسح السجل</button>
        </div>
        <ul class="log-list" id="logList">
            <li><span class="msg">لا توجد سجلات بعد.</span></li>
        </ul>
    </div>

</div>

<script>
// ══════════════════════════════════════════════════════
// الكود السري للتحقق (غيّره هنا فقط)
// ══════════════════════════════════════════════════════
const VERIFY_CODE = 'o200811547';

// ══════════════════════════════════════════════════════
// أدوات localStorage
// ══════════════════════════════════════════════════════
function getUsers() {
    try { return JSON.parse(localStorage.getItem('users')) || []; }
    catch { return []; }
}
function saveUsers(u) { localStorage.setItem('users', JSON.stringify(u)); }
function getCurrentUser() {
    try { return JSON.parse(localStorage.getItem('currentUser')); }
    catch { return null; }
}
function getLog() {
    try { return JSON.parse(localStorage.getItem('securityLog')) || []; }
    catch { return []; }
}
function saveLog(l) { localStorage.setItem('securityLog', JSON.stringify(l)); }
function addLog(msg, email = '') {
    const l = getLog();
    l.unshift({ msg, email, time: new Date().toLocaleString('ar-SA') });
    saveLog(l.slice(0, 100)); // keep last 100
}

// ══════════════════════════════════════════════════════
// التحقق من صلاحية المالك
// ══════════════════════════════════════════════════════
(function guard() {
    const u = getCurrentUser();
    if (!u || u.email !== 'obaida@cardioarab.com') {
        alert('⛔ غير مصرح لك بدخول هذه الصفحة!');
        window.location.href = 'index.html';
    }
})();

// ══════════════════════════════════════════════════════
// تسجيل خروج
// ══════════════════════════════════════════════════════
function doLogout() {
    localStorage.removeItem('currentUser');
    window.location.href = 'login.html';
}

// ══════════════════════════════════════════════════════
// قوة كلمة المرور
// ══════════════════════════════════════════════════════
function checkStrength(v) {
    const fill = document.getElementById('strengthFill');
    let score = 0;
    if (v.length >= 6) score++;
    if (v.length >= 10) score++;
    if (/[A-Z]/.test(v)) score++;
    if (/[0-9]/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;
    const colors = ['#ef4444','#f59e0b','#f59e0b','#10b981','#10b981'];
    fill.style.width = (score * 20) + '%';
    fill.style.background = colors[score - 1] || '#1e2d45';
}

// ══════════════════════════════════════════════════════
// تغيير كلمة المرور
// ══════════════════════════════════════════════════════
function changePassword() {
    const alertEl = document.getElementById('passAlert');
    function showAlert(msg, type) {
        alertEl.textContent = msg;
        alertEl.className = 'alert show alert-' + type;
        setTimeout(() => alertEl.className = 'alert', 4000);
    }

    const code       = document.getElementById('verifyCode').value.trim();
    const currentP   = document.getElementById('currentPass').value.trim();
    const newP       = document.getElementById('newPass').value.trim();
    const confirmP   = document.getElementById('confirmPass').value.trim();

    if (!code || !currentP || !newP || !confirmP) {
        return showAlert('⚠️ يرجى تعبئة جميع الحقول', 'danger');
    }
    if (code !== VERIFY_CODE) {
        return showAlert('❌ الكود السري غير صحيح', 'danger');
    }

    // التحقق من كلمة المرور الحالية
    const users = getUsers();
    const adminIdx = users.findIndex(u => u.email === 'obaida@cardioarab.com');
    if (adminIdx === -1) {
        return showAlert('❌ لم يُعثر على حساب المالك', 'danger');
    }
    if (users[adminIdx].password !== currentP) {
        return showAlert('❌ كلمة المرور الحالية غير صحيحة', 'danger');
    }
    if (newP.length < 6) {
        return showAlert('⚠️ كلمة المرور الجديدة يجب أن تكون 6 أحرف على الأقل', 'danger');
    }
    if (newP !== confirmP) {
        return showAlert('❌ كلمتا المرور الجديدتان غير متطابقتين', 'danger');
    }
    if (newP === currentP) {
        return showAlert('⚠️ كلمة المرور الجديدة مطابقة للحالية', 'danger');
    }

    users[adminIdx].password = newP;
    saveUsers(users);

    // تحديث الجلسة الحالية
    const cur = getCurrentUser();
    if (cur) { cur.password = newP; localStorage.setItem('currentUser', JSON.stringify(cur)); }

    addLog('تم تغيير كلمة مرور المالك بنجاح');
    showAlert('✅ تم تغيير كلمة المرور بنجاح!', 'success');

    // مسح الحقول
    ['verifyCode','currentPass','newPass','confirmPass'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('strengthFill').style.width = '0';
}

// ══════════════════════════════════════════════════════
// عرض المستخدمين
// ══════════════════════════════════════════════════════
let allUsers = [];

function loadUsers() {
    allUsers = getUsers();
    renderUsers(allUsers);
    renderStats(allUsers);
}

function renderStats(users) {
    document.getElementById('statTotal').textContent   = users.length;
    document.getElementById('statActive').textContent  = users.filter(u => u.subscription?.active).length;
    document.getElementById('statYearly').textContent  = users.filter(u => u.subscription?.plan === 'yearly').length;
    document.getElementById('statBlocked').textContent = users.filter(u => u.blocked).length;
}

function filterUsers(q) {
    const f = q.trim().toLowerCase();
    renderUsers(f ? allUsers.filter(u =>
        (u.name||'').toLowerCase().includes(f) ||
        (u.email||'').toLowerCase().includes(f)
    ) : allUsers);
}

function renderUsers(users) {
    const tbody = document.getElementById('usersTableBody');
    if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty">لا يوجد مستخدمون</td></tr>';
        return;
    }
    tbody.innerHTML = users.map((u, i) => {
        const plan = u.subscription?.plan || 'free';
        const active = u.subscription?.active;
        const isAdmin = u.email === 'obaida@cardioarab.com';
        return `<tr>
            <td>${i + 1}</td>
            <td>${u.name || '—'} ${isAdmin ? '<span class="badge-plan badge-admin">مالك</span>' : ''}</td>
            <td dir="ltr" style="text-align:left;">${u.email}</td>
            <td>
                <span class="badge-plan ${plan === 'yearly' ? 'badge-yearly' : plan === 'monthly' ? 'badge-monthly' : 'badge-free'}">
                    ${plan === 'yearly' ? 'سنوي' : plan === 'monthly' ? 'شهري' : 'مجاني'}
                </span>
            </td>
            <td>
                <span class="badge-plan ${u.blocked ? 'badge-blocked' : active ? 'badge-active' : 'badge-free'}">
                    ${u.blocked ? '🚫 محظور' : active ? '✅ نشط' : '⏸ غير نشط'}
                </span>
            </td>
            <td style="font-size:0.8rem; color:var(--text2);">${u.date || '—'}</td>
            <td>
                ${isAdmin ? '<span style="color:var(--text2);font-size:0.8rem;">—</span>' : `
                    ${u.blocked
                        ? `<button class="btn btn-success btn-sm" onclick="toggleBlock('${u.email}', false)">رفع الحظر</button>`
                        : `<button class="btn btn-danger btn-sm" onclick="toggleBlock('${u.email}', true)">حظر</button>`
                    }
                    <button class="btn btn-sm" style="background:rgba(239,68,68,0.08);color:#ef4444;border:1px solid rgba(239,68,68,0.2);margin-right:4px;" onclick="confirmDelete('${u.email}')">حذف</button>
                `}
            </td>
        </tr>`;
    }).join('');
}

function toggleBlock(email, block) {
    const users = getUsers();
    const idx = users.findIndex(u => u.email === email);
    if (idx === -1) return;
    users[idx].blocked = block;
    if (block) { users[idx].blockDate = new Date().toISOString(); }
    else { delete users[idx].blockDate; }
    saveUsers(users);
    addLog(block ? `تم حظر المستخدم ${email}` : `تم رفع الحظر عن ${email}`, email);
    loadUsers();
}

function confirmDelete(email) {
    if (!confirm(`هل أنت متأكد من حذف الحساب:\n${email}؟\n\nهذا الإجراء لا يمكن التراجع عنه.`)) return;
    let users = getUsers().filter(u => u.email !== email);
    saveUsers(users);
    addLog(`تم حذف المستخدم ${email}`, email);
    loadUsers();
}

// ══════════════════════════════════════════════════════
// سجل الأمان
// ══════════════════════════════════════════════════════
function loadLog() {
    const log = getLog();
    const list = document.getElementById('logList');
    if (!log.length) {
        list.innerHTML = '<li><span class="msg">لا توجد سجلات بعد.</span></li>';
        return;
    }
    list.innerHTML = log.slice(0, 30).map(l => `
        <li>
            <span class="msg">${l.msg} ${l.email ? `<span style="color:var(--text2)">(${l.email})</span>` : ''}</span>
            <span class="time">${l.time}</span>
        </li>
    `).join('');
}

function clearLog() {
    if (!confirm('هل تريد مسح سجل الأمان كاملاً؟')) return;
    saveLog([]);
    loadLog();
}

// ══════════════════════════════════════════════════════
// تهيئة
// ══════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function () {
    loadUsers();
    loadLog();
    // تحديث تلقائي كل 30 ثانية
    setInterval(() => { loadUsers(); loadLog(); }, 30000);
});
</script>

</body>
</html>
