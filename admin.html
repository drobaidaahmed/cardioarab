<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - CardioArab</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#0b1220;--bg2:#111827;--bg3:#1a2235;--border:#1e2d45;--text:#e2e8f0;--text2:#94a3b8;--accent:#8b5cf6;--green:#10b981;--red:#ef4444;--gold:#f59e0b;--blue:#3b82f6;--font:'IBM Plex Sans Arabic',sans-serif}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
        .header{background:linear-gradient(135deg,#1a0a3a,#0b1220);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;position:sticky;top:0;z-index:100}
        .logo{font-size:1.2rem;font-weight:700}.logo span{color:var(--accent)}
        .badge-top{background:linear-gradient(135deg,var(--gold),#d97706);color:#1a0a00;padding:4px 14px;border-radius:20px;font-size:.75rem;font-weight:700}
        nav{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap}
        nav a{color:var(--text2);text-decoration:none;padding:6px 14px;border-radius:8px;font-size:.875rem;transition:.2s;border:1px solid transparent}
        nav a:hover{color:var(--text);border-color:var(--border);background:var(--bg3)}
        .btn-logout{background:rgba(239,68,68,.15)!important;color:var(--red)!important;border-color:rgba(239,68,68,.3)!important;cursor:pointer}
        .container{max-width:1200px;margin:0 auto;padding:2rem 1.5rem}
        .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:2rem}
        .stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:1.25rem;text-align:center}
        .stat-card .num{font-size:2rem;font-weight:700;margin-bottom:4px}
        .stat-card.purple .num{color:var(--accent)}.stat-card.green .num{color:var(--green)}.stat-card.gold .num{color:var(--gold)}.stat-card.red .num{color:var(--red)}
        .stat-card .lbl{font-size:.8rem;color:var(--text2)}
        .section{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:1.75rem;margin-bottom:1.5rem}
        .section-title{font-size:1.1rem;font-weight:700;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;border-bottom:1px solid var(--border);padding-bottom:1rem}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
        @media(max-width:600px){.form-row{grid-template-columns:1fr}}
        .form-group{margin-bottom:1rem}
        .form-group label{display:block;font-size:.85rem;color:var(--text2);margin-bottom:6px;font-weight:600}
        .form-group input{width:100%;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:.95rem;transition:.2s}
        .form-group input:focus{outline:none;border-color:var(--accent)}
        .btn{padding:8px 16px;border:none;border-radius:8px;font-family:var(--font);font-size:.85rem;font-weight:700;cursor:pointer;transition:.2s}
        .btn-primary{background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff}
        .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(139,92,246,.4)}
        .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
        .btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
        .btn-danger:hover{background:rgba(239,68,68,.25)}
        .btn-success{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)}
        .btn-success:hover{background:rgba(16,185,129,.25)}
        .btn-activate{background:rgba(16,185,129,.2);color:var(--green);border:1px solid rgba(16,185,129,.4);font-size:.8rem;padding:6px 12px}
        .btn-activate:hover{background:rgba(16,185,129,.35)}
        .alert{padding:12px 16px;border-radius:10px;margin-top:1rem;font-size:.9rem;font-weight:600;display:none}
        .alert.show{display:block}
        .alert-success{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)}
        .alert-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
        .table-wrap{overflow-x:auto}
        table{width:100%;border-collapse:collapse;font-size:.875rem}
        thead th{background:var(--bg2);color:var(--text2);padding:10px 14px;text-align:right;font-weight:600;border-bottom:1px solid var(--border)}
        tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
        tbody tr:hover{background:rgba(255,255,255,.03)}
        tbody td{padding:10px 14px;vertical-align:middle}
        .bp{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:700}
        .bp-active{background:rgba(16,185,129,.2);color:var(--green)}
        .bp-inactive{background:rgba(239,68,68,.2);color:var(--red)}
        .bp-admin{background:rgba(245,158,11,.2);color:var(--gold)}
        .search-bar{width:100%;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:.9rem;margin-bottom:1rem}
        .search-bar:focus{outline:none;border-color:var(--accent)}
        .log-list{list-style:none}
        .log-list li{padding:8px 0;border-bottom:1px solid var(--border);font-size:.85rem;display:flex;justify-content:space-between;gap:1rem}
        .log-list li:last-child{border-bottom:none}
        .log-list .msg{color:var(--text)}.log-list .time{white-space:nowrap;font-size:.75rem;color:var(--text2)}
        .empty{text-align:center;padding:2rem;color:var(--text2);font-size:.9rem}
        .strength-bar{height:4px;border-radius:2px;margin-top:6px;background:var(--border);overflow:hidden}
        .strength-fill{height:100%;border-radius:2px;width:0;transition:all .3s}
        .actions{display:flex;gap:6px;flex-wrap:wrap}
    </style>
</head>
<body>

<header class="header">
    <div style="display:flex;align-items:center;gap:.75rem">
        <div class="logo">💓 <span>CardioArab</span></div>
        <span class="badge-top">👑 لوحة التحكم</span>
    </div>
    <nav>
        <a href="index.html">🏠 الرئيسية</a>
        <a href="guidelines.html">📚 المرشدات</a>
        <a href="profile.html">👤 ملفي</a>
        <a href="#" class="btn-logout" onclick="doLogout()">🚪 خروج</a>
    </nav>
</header>

<div class="container">

    <!-- إحصائيات -->
    <div class="stats-row">
        <div class="stat-card purple"><div class="num" id="statTotal">—</div><div class="lbl">إجمالي المستخدمين</div></div>
        <div class="stat-card green"><div class="num" id="statActive">—</div><div class="lbl">اشتراك نشط</div></div>
        <div class="stat-card gold"><div class="num" id="statPending">—</div><div class="lbl">بانتظار التفعيل</div></div>
        <div class="stat-card red"><div class="num" id="statBlocked">—</div><div class="lbl">محظورون</div></div>
    </div>

    <!-- تغيير كلمة المرور -->
    <div class="section">
        <div class="section-title">🔑 تغيير كلمة مرور المالك</div>
        <div class="form-row">
            <div class="form-group">
                <label>🛡️ الكود السري للتحقق</label>
                <input type="password" id="verifyCode" placeholder="كود التحقق" dir="ltr">
            </div>
            <div class="form-group">
                <label>🔑 كلمة المرور الحالية</label>
                <input type="password" id="currentPass" placeholder="كلمة مرورك الحالية" dir="ltr">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>🆕 كلمة المرور الجديدة</label>
                <input type="password" id="newPass" placeholder="6 أحرف على الأقل" dir="ltr" oninput="checkStr(this.value)">
                <div class="strength-bar"><div class="strength-fill" id="sf"></div></div>
            </div>
            <div class="form-group">
                <label>✅ تأكيد كلمة المرور</label>
                <input type="password" id="confirmPass" placeholder="أعد كتابة كلمة المرور" dir="ltr">
            </div>
        </div>
        <button class="btn btn-primary" onclick="changePassword()">🔐 تغيير كلمة المرور</button>
        <div class="alert" id="passAlert"></div>
    </div>

    <!-- إدارة المستخدمين -->
    <div class="section">
        <div class="section-title">👥 إدارة المستخدمين</div>
        <input class="search-bar" type="text" placeholder="🔍 بحث بالاسم أو البريد..." oninput="filterUsers(this.value)">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الاسم</th>
                        <th>البريد</th>
                        <th>الحالة</th>
                        <th>تاريخ الانتهاء</th>
                        <th>تاريخ التسجيل</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr><td colspan="7" class="empty">⏳ جاري التحميل...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- سجل الأمان -->
    <div class="section">
        <div class="section-title">
            <span>📋 سجل الأمان</span>
            <button class="btn btn-danger" style="padding:6px 14px;font-size:.8rem" onclick="clearLog()">🗑️ مسح</button>
        </div>
        <ul class="log-list" id="logList">
            <li><span class="msg">⏳ جاري التحميل...</span></li>
        </ul>
    </div>

</div>

<script>
const SB_URL = 'https://ikisgwnsxadiujueeava.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlraXNnd25zeGFkaXVqdWVlYXZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NzU5ODYsImV4cCI6MjA5ODI1MTk4Nn0.Ar45kQJPOgJ9ITqGVv9XeSxpGgyx53s6CTmFCNDBa-g';
const H = {'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

async function sbGet(t,q=''){const r=await fetch(`${SB_URL}/rest/v1/${t}${q}`,{headers:H});if(!r.ok)throw await r.json();return r.json();}
async function sbPost(t,d){const r=await fetch(`${SB_URL}/rest/v1/${t}`,{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(d)});if(!r.ok)throw await r.json();return r.json();}
async function sbPatch(t,q,d){const r=await fetch(`${SB_URL}/rest/v1/${t}${q}`,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(d)});if(!r.ok)throw await r.json();return r.json();}
async function sbDelete(t,q){const r=await fetch(`${SB_URL}/rest/v1/${t}${q}`,{method:'DELETE',headers:H});if(!r.ok)throw await r.json();}
async function addLog(msg,email=''){try{await sbPost('activity_log',{message:msg,email});}catch{}}

// Auth Guard
const VERIFY_CODE = 'o200811547';
const adminUser = JSON.parse(localStorage.getItem('currentUser')||'null');
if(!adminUser||!adminUser.is_admin){alert('⛔ غير مصرح لك!');location.href='index.html';}
function doLogout(){localStorage.removeItem('currentUser');location.href='login.html';}

// كلمة المرور
function checkStr(v){
    let s=0;
    if(v.length>=6)s++;if(v.length>=10)s++;if(/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++;
    const f=document.getElementById('sf');
    f.style.width=(s*20)+'%';
    f.style.background=['#ef4444','#f59e0b','#f59e0b','#10b981','#10b981'][s-1]||'#1e2d45';
}

async function changePassword(){
    const el=document.getElementById('passAlert');
    const show=(m,t)=>{el.textContent=m;el.className='alert show alert-'+t;setTimeout(()=>el.className='alert',4000);};
    const code=document.getElementById('verifyCode').value.trim();
    const cur=document.getElementById('currentPass').value.trim();
    const nw=document.getElementById('newPass').value.trim();
    const cf=document.getElementById('confirmPass').value.trim();
    if(!code||!cur||!nw||!cf)return show('⚠️ يرجى تعبئة جميع الحقول','danger');
    if(code!==VERIFY_CODE)return show('❌ الكود السري غير صحيح','danger');
    if(nw.length<6)return show('⚠️ كلمة المرور قصيرة جداً','danger');
    if(nw!==cf)return show('❌ كلمتا المرور غير متطابقتين','danger');
    if(nw===cur)return show('⚠️ كلمة المرور مطابقة للحالية','danger');
    try{
        const check=await sbGet('users',`?id=eq.${adminUser.id}&password=eq.${cur}`);
        if(!check.length)return show('❌ كلمة المرور الحالية غير صحيحة','danger');
        await sbPatch('users',`?id=eq.${adminUser.id}`,{password:nw});
        adminUser.password=nw;
        localStorage.setItem('currentUser',JSON.stringify(adminUser));
        await addLog('تغيير كلمة المرور',adminUser.email);
        show('✅ تم تغيير كلمة المرور بنجاح!','success');
        ['verifyCode','currentPass','newPass','confirmPass'].forEach(id=>document.getElementById(id).value='');
        document.getElementById('sf').style.width='0';
    }catch(e){show('❌ خطأ في الاتصال','danger');}
}

// ─── المستخدمون ──────────────────────────────────────
async function loadUsers(q=''){
    const tbody=document.getElementById('usersTableBody');
    tbody.innerHTML='<tr><td colspan="7" class="empty">⏳ جاري التحميل...</td></tr>';
    try{
        let query='?order=created_at.desc';
        if(q) query+=`&or=(name.ilike.*${q}*,email.ilike.*${q}*)`;
        const users=await sbGet('users',query);
        if(!users.length){tbody.innerHTML='<tr><td colspan="7" class="empty">لا يوجد مستخدمون</td></tr>';return;}

        let subMap={};
        try{
            const subs=await sbGet('subscriptions','?select=user_id,active,end_date');
            subs.forEach(s=>subMap[s.user_id]=s);
        }catch{}

        const now=new Date();
        tbody.innerHTML=users.map((u,i)=>{
            if(u.is_admin) return `<tr>
                <td>${i+1}</td>
                <td>${u.name||'—'} <span class="bp bp-admin">مالك</span></td>
                <td dir="ltr" style="text-align:left">${u.email}</td>
                <td><span class="bp bp-active">✅ نشط دائماً</span></td>
                <td>—</td>
                <td>${new Date(u.created_at).toLocaleDateString('ar-SA')}</td>
                <td>—</td>
            </tr>`;

            const sub=subMap[u.id]||{};
            const endDate=sub.end_date?new Date(sub.end_date):null;
            let active=sub.active&&endDate&&now<endDate;
            const daysLeft=active?Math.ceil((endDate-now)/86400000):null;

            return `<tr>
                <td>${i+1}</td>
                <td>${u.name||'—'}</td>
                <td dir="ltr" style="text-align:left;font-size:.83rem">${u.email}</td>
                <td>
                    ${u.blocked
                        ?'<span class="bp" style="background:rgba(239,68,68,.2);color:#ef4444">🚫 محظور</span>'
                        :active
                            ?`<span class="bp bp-active">✅ نشط · ${daysLeft} يوم</span>`
                            :'<span class="bp bp-inactive">🔴 غير نشط</span>'
                    }
                </td>
                <td style="font-size:.8rem;color:var(--text2)">${endDate&&active?endDate.toLocaleDateString('ar-SA'):'—'}</td>
                <td style="font-size:.8rem;color:var(--text2)">${new Date(u.created_at).toLocaleDateString('ar-SA')}</td>
                <td>
                    <div class="actions">
                        <button class="btn btn-activate" onclick="activateUser('${u.id}','${u.email}','${u.name}')">✅ تفعيل شهر</button>
                        ${u.blocked
                            ?`<button class="btn btn-success" onclick="toggleBlock('${u.id}',false)">رفع الحظر</button>`
                            :`<button class="btn btn-danger" onclick="toggleBlock('${u.id}',true)">حظر</button>`
                        }
                        <button class="btn" style="background:rgba(239,68,68,.08);color:#ef4444;border:1px solid rgba(239,68,68,.2)" onclick="confirmDelete('${u.id}','${u.email}')">حذف</button>
                    </div>
                </td>
            </tr>`;
        }).join('');
    }catch(e){
        tbody.innerHTML=`<tr><td colspan="7" class="empty">❌ خطأ: ${e.message||JSON.stringify(e)}</td></tr>`;
    }
}

function filterUsers(q){clearTimeout(window._ft);window._ft=setTimeout(()=>loadUsers(q),400);}

// ─── تفعيل شهر ───────────────────────────────────────
async function activateUser(id, email, name){
    if(!confirm(`تفعيل اشتراك شهر كامل للمستخدم:\n${name} (${email})؟`)) return;
    try{
        const endDate=new Date();
        endDate.setDate(endDate.getDate()+30);

        const subs=await sbGet('subscriptions',`?user_id=eq.${id}`);
        if(subs.length){
            await sbPatch('subscriptions',`?user_id=eq.${id}`,{plan:'monthly',active:true,end_date:endDate.toISOString(),days:30});
        }else{
            await sbPost('subscriptions',{user_id:id,plan:'monthly',active:true,end_date:endDate.toISOString(),days:30});
        }
        await addLog(`تم تفعيل اشتراك شهر للمستخدم ${name}`,email);
        alert(`✅ تم تفعيل اشتراك ${name} حتى ${endDate.toLocaleDateString('ar-SA')}`);
        loadUsers(); loadStats();
    }catch(e){alert('❌ خطأ في التفعيل: '+JSON.stringify(e));}
}

async function toggleBlock(id,block){
    try{
        await sbPatch('users',`?id=eq.${id}`,{blocked:block,block_date:block?new Date().toISOString():null});
        await addLog(block?'حظر مستخدم':'رفع حظر مستخدم');
        loadUsers();
    }catch{alert('خطأ في العملية');}
}

async function confirmDelete(id,email){
    if(!confirm(`حذف الحساب:\n${email}؟`))return;
    try{
        await sbDelete('users',`?id=eq.${id}`);
        await addLog('حذف مستخدم: '+email,email);
        loadUsers();loadStats();
    }catch{alert('خطأ في الحذف');}
}

// ─── إحصائيات ────────────────────────────────────────
async function loadStats(){
    try{
        const [users,active,blocked]=await Promise.all([
            sbGet('users',''),
            sbGet('subscriptions','?active=eq.true'),
            sbGet('users','?blocked=eq.true')
        ]);
        const realUsers=users.filter(u=>!u.is_admin);
        document.getElementById('statTotal').textContent=realUsers.length;
        document.getElementById('statActive').textContent=active.length;
        document.getElementById('statPending').textContent=realUsers.length-active.length;
        document.getElementById('statBlocked').textContent=blocked.filter(u=>!u.is_admin).length;
    }catch{}
}

// ─── سجل الأمان ──────────────────────────────────────
async function loadLog(){
    const list=document.getElementById('logList');
    try{
        const logs=await sbGet('activity_log','?order=created_at.desc&limit=30');
        if(!logs.length){list.innerHTML='<li><span class="msg">لا توجد سجلات بعد.</span></li>';return;}
        list.innerHTML=logs.map(l=>`<li>
            <span class="msg">${l.message} ${l.email?`<span style="color:var(--text2)">(${l.email})</span>`:''}</span>
            <span class="time">${new Date(l.created_at).toLocaleString('ar-SA')}</span>
        </li>`).join('');
    }catch{list.innerHTML='<li><span class="msg">❌ خطأ في التحميل</span></li>';}
}

async function clearLog(){
    if(!confirm('مسح سجل الأمان كاملاً؟'))return;
    try{await sbDelete('activity_log','?id=gt.00000000-0000-0000-0000-000000000000');}catch{}
    loadLog();
}

// ─── تهيئة ───────────────────────────────────────────
loadStats();loadUsers();loadLog();
setInterval(()=>{loadStats();loadUsers();loadLog();},30000);
</script>
<script src="protection.js"></script>
</body>
</html>
